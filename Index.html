<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--primary:#1565c0;--red:#e53935;--green:#43a047;--orange:#f57c00;--grey:#90a4ae;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:linear-gradient(135deg,#1565c0 0%,#0d47a1 100%);color:#fff;padding:16px 24px;box-shadow:0 2px 12px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar h1{font-size:1.3rem;font-weight:800;}
.topbar .tabs{display:flex;gap:8px;}
.tab-btn{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);color:#fff;padding:6px 16px;border-radius:8px;cursor:pointer;font-weight:700;font-size:.85em;transition:all .2s;}
.tab-btn.active{background:#fff;color:#1565c0;border-color:#fff;}
.container{max-width:1400px;margin:0 auto;padding:20px;}
.view{display:none;} .view.active{display:block;}

/* Search */
.search-bar{margin-bottom:20px;display:flex;gap:10px;align-items:center;}
.search-bar input{flex:1;padding:10px 16px;border:2px solid #ddd;border-radius:10px;font-size:1rem;outline:none;transition:border .2s;}
.search-bar input:focus{border-color:var(--primary);}
.search-bar .count{font-weight:700;color:var(--grey);font-size:.9rem;white-space:nowrap;}

/* Agent cards */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.agent-card{background:var(--card);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden;transition:transform .15s;}
.agent-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.12);}
.agent-header{background:linear-gradient(135deg,#1976d2,#1565c0);color:#fff;padding:12px 16px;font-weight:700;font-size:1.05rem;display:flex;justify-content:space-between;align-items:center;}
.agent-header .badge{background:rgba(255,255,255,.25);padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:600;}
.agent-header .badge.ok{background:rgba(76,175,80,.9);}
.agent-header .badge.warn{background:rgba(255,152,0,.9);}
.agent-header .badge.crit{background:rgba(229,57,53,.9);}
.agent-body{padding:12px 16px;}
.item-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:.88rem;}
.item-row:last-child{border-bottom:none;}
.item-row .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dot.green{background:var(--green);}
.dot.red{background:var(--red);}
.dot.orange{background:var(--orange);}
.dot.grey{background:var(--grey);}
.item-row .label{font-weight:600;min-width:120px;}
.item-row .value{flex:1;font-size:.84rem;}
.item-row.missing .value{color:var(--red);font-weight:600;}
.item-row.overdue .value{color:var(--red);font-weight:700;}
.item-row.ok .value{color:var(--green);}
.item-row.upcoming .value{color:var(--orange);font-weight:600;}

/* Comments */
.comments-section{border-top:2px solid #e8e8e8;margin-top:10px;padding-top:8px;}
.comments-toggle{background:none;border:none;color:var(--primary);cursor:pointer;font-weight:700;font-size:.85rem;padding:4px 0;display:flex;align-items:center;gap:4px;}
.comments-list{margin-top:6px;}
.comment-item{display:flex;align-items:flex-start;gap:6px;padding:4px 0;font-size:.82rem;border-bottom:1px solid #f5f5f5;}
.comment-item.validated{text-decoration:line-through;opacity:.55;}
.comment-item .c-text{flex:1;}
.comment-item .c-date{color:var(--grey);font-size:.75rem;white-space:nowrap;}
.comment-item .c-actions{display:flex;gap:4px;}
.c-btn{background:none;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:.75rem;padding:2px 6px;transition:all .15s;}
.c-btn:hover{background:#e3f2fd;}
.c-btn.validate{color:var(--green);border-color:var(--green);}
.c-btn.delete{color:var(--red);border-color:var(--red);}
.add-comment{display:flex;gap:6px;margin-top:6px;}
.add-comment input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:.82rem;outline:none;}
.add-comment button{background:var(--primary);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.82rem;}

/* Rules tab */
.rules-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.rules-table th{background:linear-gradient(135deg,#1976d2,#1565c0);color:#fff;padding:12px;text-align:left;font-size:.9rem;}
.rules-table td{padding:10px 12px;border-bottom:1px solid #eee;font-size:.88rem;}
.rules-table tr:hover{background:#e3f2fd;}
.rules-table td:nth-child(3){text-align:center;font-weight:700;}

/* Spinner */
.spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;}
.spinner{border:6px solid #e0e0e0;border-top:6px solid var(--primary);border-radius:50%;width:48px;height:48px;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <h1>🏥 Suivi INSARAG</h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('agents')">👥 Agents</button>
    <button class="tab-btn" onclick="switchTab('rules')">📋 Règle médicale</button>
  </div>
</div>

<div class="container">
  <div id="viewAgents" class="view active">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Rechercher un agent..." oninput="filterAgents()">
      <span class="count" id="agentCount"></span>
    </div>
    <div id="loadingAgents" class="spinner-wrap"><div class="spinner"></div><p style="margin-top:12px;color:#666;">Chargement des données…</p></div>
    <div class="agent-grid" id="agentGrid" style="display:none;"></div>
  </div>

  <div id="viewRules" class="view">
    <h2 style="margin-bottom:16px;">📋 Règles médicales configurables</h2>
    <p style="margin-bottom:16px;color:#666;font-size:.9rem;">Ces règles sont modifiables directement dans l'onglet <b>« règle médicale »</b> du spreadsheet. Les changements sont pris en compte au rechargement.</p>
    <table class="rules-table" id="rulesTable">
      <thead><tr><th>Vaccin / Évènement</th><th>Type</th><th>Délai rappel (ans)</th><th>Description</th></tr></thead>
      <tbody id="rulesBody"></tbody>
    </table>
  </div>
</div>

<script>
/* ═══ GLOBALS ═══ */
var DATA = null;
var allCards = [];

/* ═══ TABS ═══ */
function switchTab(name) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  if (name === 'agents') {
    document.getElementById('viewAgents').classList.add('active');
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
  } else {
    document.getElementById('viewRules').classList.add('active');
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
  }
}

/* ═══ INIT ═══ */
google.script.run.withSuccessHandler(onData).withFailureHandler(onErr).getData();

function onErr(e) {
  document.getElementById('loadingAgents').innerHTML = '<p style="color:red;">Erreur : '+e.message+'</p>';
}

function onData(d) {
  DATA = d;
  renderRules();
  renderAgents();
}

/* ═══ DATE HELPERS ═══ */
function parseDate(s) {
  if (!s) return null;
  s = String(s).trim();
  // dd/MM/yyyy
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function fmtDate(d) {
  if (!d) return '';
  var dd = ('0'+d.getDate()).slice(-2);
  var mm = ('0'+(d.getMonth()+1)).slice(-2);
  return dd+'/'+mm+'/'+d.getFullYear();
}

function addYears(d, y) {
  var r = new Date(d);
  r.setFullYear(r.getFullYear() + y);
  return r;
}

function addMonths(d, m) {
  var r = new Date(d);
  r.setMonth(r.getMonth() + m);
  return r;
}

function age(birthDate) {
  if (!birthDate) return null;
  var today = new Date();
  var a = today.getFullYear() - birthDate.getFullYear();
  var m = today.getMonth() - birthDate.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) a--;
  return a;
}

/* ═══ BUILD RULES MAP ═══ */
function getRulesMap() {
  var map = {};
  if (!DATA || !DATA.rules) return map;
  DATA.rules.forEach(function(r) { map[r.name] = r; });
  return map;
}

/* ═══ ANALYSE AGENT ═══ */
function analyzeAgent(agent) {
  var f = agent.fields;
  var rules = getRulesMap();
  var items = [];
  var now = new Date();
  var birthDate = parseDate(f['Date naissance']);
  var agentAge = age(birthDate);

  // DTP 25 / 45 / 65
  [25, 45, 65].forEach(function(a) {
    var key = 'DTP ' + a;
    var rule = rules[key];
    if (!rule) return;
    if (agentAge === null || agentAge < a) {
      if (a <= 45 || agentAge === null) return; // skip if not old enough
      return;
    }
    var val = f[key];
    var d = parseDate(val);
    if (!d && (!val || val === '' || val === '0' || val === 'FALSE')) {
      items.push({ label: key, status: 'missing', text: 'MANQUANT – obligatoire à ' + a + ' ans', cls: 'red' });
    } else if (d) {
      items.push({ label: key, status: 'ok', text: fmtDate(d), cls: 'green' });
    } else if (String(val).toLowerCase() === 'ok') {
      items.push({ label: key, status: 'ok', text: 'OK', cls: 'green' });
    } else {
      items.push({ label: key, status: 'ok', text: String(val), cls: 'green' });
    }
  });

  // HEP B – presence
  (function() {
    var val = String(f['HEP B'] || '').toLowerCase();
    if (val === 'ok') {
      items.push({ label: 'HEP B', status: 'ok', text: 'OK', cls: 'green' });
    } else {
      items.push({ label: 'HEP B', status: 'missing', text: 'MANQUANT', cls: 'red' });
    }
  })();

  // HEP A 1
  (function() {
    var d1 = parseDate(f['HEP A 1']);
    if (!d1) {
      items.push({ label: 'HEP A 1', status: 'missing', text: 'MANQUANT – première dose requise', cls: 'red' });
    } else {
      items.push({ label: 'HEP A 1', status: 'ok', text: fmtDate(d1), cls: 'green' });
    }
  })();

  // HEP A 2 – rappel 6-12 mois après dose 1
  (function() {
    var d1 = parseDate(f['HEP A 1']);
    var d2 = parseDate(f['HEP A 2']);
    var rule = rules['HEP A 2'];
    var delayYears = rule ? rule.delay : 1;
    if (!d1) {
      // pas de dose 1, on ne parle pas du rappel
    } else if (!d2) {
      var due = addMonths(d1, delayYears * 12);
      var overdue = now > due;
      items.push({ label: 'HEP A 2', status: overdue ? 'overdue' : 'upcoming', text: 'Rappel prévu : ' + fmtDate(due) + (overdue ? ' – EN RETARD' : ''), cls: overdue ? 'red' : 'orange' });
    } else {
      items.push({ label: 'HEP A 2', status: 'ok', text: fmtDate(d2), cls: 'green' });
    }
  })();

  // Fièvre jaune 1
  (function() {
    var d1 = parseDate(f['Fièvre jaune 1']);
    if (!d1) {
      items.push({ label: 'Fièvre jaune 1', status: 'missing', text: 'MANQUANT – première dose requise', cls: 'red' });
    } else {
      items.push({ label: 'Fièvre jaune 1', status: 'ok', text: fmtDate(d1), cls: 'green' });
    }
  })();

  // Fièvre jaune 2 – rappel configurable (default 10 ans après dose 1)
  (function() {
    var d1 = parseDate(f['Fièvre jaune 1']);
    var d2 = parseDate(f['Fièvre jaune 2']);
    var rule = rules['Fièvre jaune 2'];
    var delayY = rule ? rule.delay : 10;
    if (!d1) return;
    if (!d2) {
      var due = addYears(d1, delayY);
      var overdue = now > due;
      items.push({ label: 'Fièvre jaune 2', status: overdue ? 'overdue' : 'upcoming', text: 'Rappel prévu : ' + fmtDate(due) + (overdue ? ' – EN RETARD' : ''), cls: overdue ? 'red' : 'orange' });
    } else {
      items.push({ label: 'Fièvre jaune 2', status: 'ok', text: fmtDate(d2), cls: 'green' });
    }
  })();

  // Typhoïde – rappel configurable (default 3 ans)
  (function() {
    var d = parseDate(f['Typhoïde']);
    var rule = rules['Typhoïde'];
    var delayY = rule ? rule.delay : 3;
    if (!d) {
      items.push({ label: 'Typhoïde', status: 'missing', text: 'MANQUANT', cls: 'red' });
    } else {
      var due = addYears(d, delayY);
      var overdue = now > due;
      if (overdue) {
        items.push({ label: 'Typhoïde', status: 'overdue', text: fmtDate(d) + ' – Rappel dépassé (dû ' + fmtDate(due) + ')', cls: 'red' });
      } else {
        items.push({ label: 'Typhoïde', status: 'ok', text: fmtDate(d) + ' – Prochain rappel : ' + fmtDate(due), cls: 'green' });
      }
    }
  })();

  // Méningo – rappel configurable (default 5 ans)
  (function() {
    var d = parseDate(f['Méningo ACYW135']);
    // try alternate key without space
    if (!d) d = parseDate(f['Méningo ACYW135 ']);
    var rule = rules['Méningo ACYW135'];
    var delayY = rule ? rule.delay : 5;
    if (!d) {
      items.push({ label: 'Méningo', status: 'missing', text: 'MANQUANT', cls: 'red' });
    } else {
      var due = addYears(d, delayY);
      var overdue = now > due;
      if (overdue) {
        items.push({ label: 'Méningo', status: 'overdue', text: fmtDate(d) + ' – Rappel dépassé (dû ' + fmtDate(due) + ')', cls: 'red' });
      } else {
        items.push({ label: 'Méningo', status: 'ok', text: fmtDate(d) + ' – Prochain rappel : ' + fmtDate(due), cls: 'green' });
      }
    }
  })();

  // ROR – presence
  (function() {
    var val = String(f['ROR'] || '').toLowerCase();
    if (val === 'ok') {
      items.push({ label: 'ROR', status: 'ok', text: 'OK', cls: 'green' });
    } else if (val && val !== '' && val !== '0' && val !== 'false') {
      items.push({ label: 'ROR', status: 'ok', text: String(f['ROR']), cls: 'green' });
    } else {
      items.push({ label: 'ROR', status: 'missing', text: 'MANQUANT', cls: 'red' });
    }
  })();

  // Grippe – info only
  (function() {
    var val = String(f['Grippe'] || '').toLowerCase();
    if (val === 'ok') {
      items.push({ label: 'Grippe', status: 'ok', text: 'OK', cls: 'green' });
    } else if (val && val !== '' && val !== '0' && val !== 'false') {
      items.push({ label: 'Grippe', status: 'ok', text: String(f['Grippe']), cls: 'grey' });
    } else {
      items.push({ label: 'Grippe', status: 'info', text: 'Non renseigné', cls: 'grey' });
    }
  })();

  return items;
}

/* ═══ RENDER AGENTS ═══ */
function renderAgents() {
  var grid = document.getElementById('agentGrid');
  grid.innerHTML = '';
  allCards = [];

  DATA.agents.forEach(function(agent) {
    var items = analyzeAgent(agent);
    var missing = items.filter(function(i){ return i.cls === 'red'; }).length;
    var upcoming = items.filter(function(i){ return i.cls === 'orange'; }).length;
    var badgeCls = missing > 0 ? 'crit' : (upcoming > 0 ? 'warn' : 'ok');
    var badgeTxt = missing > 0 ? missing + ' manquant' + (missing > 1 ? 's' : '') : (upcoming > 0 ? upcoming + ' à prévoir' : '✓ Complet');

    var card = document.createElement('div');
    card.className = 'agent-card';
    card.dataset.name = agent.name.toLowerCase();

    var html = '<div class="agent-header"><span>' + escHtml(agent.name) + '</span><span class="badge ' + badgeCls + '">' + badgeTxt + '</span></div>';
    html += '<div class="agent-body">';

    items.forEach(function(it) {
      var rowCls = it.cls === 'red' ? 'missing' : (it.cls === 'orange' ? 'upcoming' : 'ok');
      html += '<div class="item-row ' + rowCls + '"><div class="dot ' + it.cls + '"></div><span class="label">' + escHtml(it.label) + '</span><span class="value">' + escHtml(it.text) + '</span></div>';
    });

    // Comments section
    var agComments = (DATA.comments && DATA.comments[agent.name]) || [];
    var agId = 'cmt_' + agent.col;
    html += '<div class="comments-section">';
    html += '<button class="comments-toggle" onclick="toggleComments(\'' + agId + '\')">💬 Commentaires (' + agComments.length + ') ▾</button>';
    html += '<div id="' + agId + '" style="display:none;">';
    html += '<div class="comments-list" id="list_' + agId + '">';
    agComments.forEach(function(c) {
      html += renderComment(c);
    });
    html += '</div>';
    html += '<div class="add-comment"><input type="text" id="input_' + agId + '" placeholder="Ajouter un commentaire…" onkeydown="if(event.key===\'Enter\')submitComment(\'' + escAttr(agent.name) + '\',\'' + agId + '\')"><button onclick="submitComment(\'' + escAttr(agent.name) + '\',\'' + agId + '\')">Envoyer</button></div>';
    html += '</div></div>';

    html += '</div>';
    card.innerHTML = html;
    grid.appendChild(card);
    allCards.push(card);
  });

  document.getElementById('loadingAgents').style.display = 'none';
  grid.style.display = '';
  updateCount();
}

function renderComment(c) {
  return '<div class="comment-item ' + (c.validated ? 'validated' : '') + '">' +
    '<span class="c-text">' + escHtml(c.text) + '</span>' +
    '<span class="c-date">' + escHtml(c.date) + '</span>' +
    '<span class="c-actions">' +
    (c.validated ? '' : '<button class="c-btn validate" title="Valider" onclick="doValidate(' + c.row + ')">✓</button>') +
    '<button class="c-btn delete" title="Supprimer" onclick="doDelete(' + c.row + ')">✕</button>' +
    '</span></div>';
}

/* ═══ COMMENTS ACTIONS ═══ */
function toggleComments(id) {
  var el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function submitComment(agentName, agId) {
  var input = document.getElementById('input_' + agId);
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.disabled = true;
  google.script.run.withSuccessHandler(function(){ reload(); }).withFailureHandler(function(e){ alert('Erreur: '+e.message); input.disabled=false; }).addComment(agentName, text);
}

function doValidate(row) {
  google.script.run.withSuccessHandler(function(){ reload(); }).withFailureHandler(function(e){ alert('Erreur: '+e.message); }).validateComment(row);
}

function doDelete(row) {
  if (!confirm('Supprimer ce commentaire ?')) return;
  google.script.run.withSuccessHandler(function(){ reload(); }).withFailureHandler(function(e){ alert('Erreur: '+e.message); }).deleteComment(row);
}

function reload() {
  google.script.run.withSuccessHandler(onData).getData();
}

/* ═══ SEARCH ═══ */
function filterAgents() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  allCards.forEach(function(card) {
    card.style.display = card.dataset.name.indexOf(q) >= 0 ? '' : 'none';
  });
  updateCount();
}

function updateCount() {
  var visible = allCards.filter(function(c){ return c.style.display !== 'none'; }).length;
  document.getElementById('agentCount').textContent = visible + '/' + allCards.length + ' agents';
}

/* ═══ RENDER RULES ═══ */
function renderRules() {
  var tbody = document.getElementById('rulesBody');
  tbody.innerHTML = '';
  DATA.rules.forEach(function(r) {
    var typeLabel = { 'age': '🎂 Lié à l\'âge', 'presence': '✅ Présence/Absence', 'date': '📅 Date', 'rappel': '🔄 Rappel' }[r.type] || r.type;
    tbody.innerHTML += '<tr><td><b>' + escHtml(r.name) + '</b></td><td>' + typeLabel + '</td><td>' + (r.delay > 0 ? r.delay + ' ans' : '–') + '</td><td>' + escHtml(r.desc) + '</td></tr>';
  });
}

/* ═══ UTILS ═══ */
function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
</script>
</body>
</html>
